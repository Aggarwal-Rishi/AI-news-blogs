{% extends 'blog/base_public.html' %}

{% block title %}{{ post.title }} - AI News Blog{% endblock %}

{% block content %}
<article class="post-detail-container">
    <!-- Featured Image -->
    {% if post.featured_image_url %}
        <div class="post-detail-image-container">
            <img src="{{ post.featured_image_url }}" alt="{{ post.title }}" class="post-detail-image">
        </div>
    {% endif %}

    <!-- Header Metadata -->
    <h1 class="post-detail-title">{{ post.title }}</h1>
    <div class="post-detail-date">
        Published on {{ post.published_at|date:"F j, Y" }}
    </div>

    <!-- Divider Line -->
    <hr class="post-detail-divider">

    <!-- Rendered Blog Body -->
    <div class="post-detail-content">
        {{ post.content|safe }}
    </div>

    <!-- Back to Home Button -->
    <div>
        <a href="{% url 'blog:post_list' %}" class="btn-ghost">Back to Home</a>
    </div>
</article>
{% endblock %}
