{% extends 'dashboard/base_dashboard.html' %}
{% load static %}

{% block title %}Admin Login{% endblock %}

{% block full_layout %}
<div class="login-layout">
    <div class="login-card">
        <div class="login-logo-container">
            <img src="{% static 'blog/images/logo2.png' %}" alt="AI News Blog" class="login-logo">
        </div>
        <h1 class="login-title">Admin Login</h1>

        <!-- Login Error alerts -->
        {% if messages %}
            <div class="login-errors">
                {% for message in messages %}
                    <div class="login-error-alert">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" class="form-control" id="id_username" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" class="form-control" id="id_password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">Log In</button>
        </form>
    </div>
</div>
{% endblock %}
